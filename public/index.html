<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Aviator Probe — Dashboard</title>
<script src="https://cdn.socket.io/4.7.4/socket.io.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: #0a0e17;
  color: #e0e6f0;
  min-height: 100vh;
  padding: 20px;
}
.container { max-width: 1200px; margin: 0 auto; }

h1 {
  font-size: 28px; margin-bottom: 8px;
  background: linear-gradient(135deg, #00d4ff, #7b2ff7);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}
.subtitle { color: #6b7b8d; margin-bottom: 30px; font-size: 14px; }

.status-bar { display: flex; gap: 20px; margin-bottom: 30px; flex-wrap: wrap; }
.status-card {
  background: #131a29; border: 1px solid #1e2a3d; border-radius: 12px;
  padding: 16px 24px; flex: 1; min-width: 150px;
}
.status-card .label { color: #6b7b8d; font-size: 12px; text-transform: uppercase; letter-spacing: 1px; }
.status-card .value { font-size: 28px; font-weight: 700; margin-top: 4px; }
.status-card .value.connected { color: #22c55e; }
.status-card .value.disconnected { color: #ef4444; }
.status-card .value.flying { color: #f59e0b; }
.status-card .value.waiting { color: #3b82f6; }
.status-card .value.crashed { color: #ef4444; }

.controls { display: flex; gap: 12px; margin-bottom: 30px; flex-wrap: wrap; }
button {
  padding: 10px 24px; border: none; border-radius: 8px;
  font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.2s;
}
button:hover { transform: translateY(-1px); opacity: 0.9; }
button:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
.btn-start { background: #22c55e; color: white; }
.btn-stop { background: #ef4444; color: white; }
.btn-test { background: #3b82f6; color: white; }

.latest-crash {
  background: #131a29; border: 1px solid #1e2a3d; border-radius: 12px;
  padding: 24px; margin-bottom: 30px; text-align: center;
}
.latest-crash .crash-value {
  font-size: 64px; font-weight: 800;
  background: linear-gradient(135deg, #f59e0b, #ef4444);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}
.latest-crash .crash-label { color: #6b7b8d; font-size: 14px; margin-top: 4px; }
.latest-crash .crash-time { color: #4a5a6d; font-size: 12px; margin-top: 8px; }

.latest-crash .flying-value {
  font-size: 72px; font-weight: 800;
  background: linear-gradient(135deg, #00d4ff, #22c55e);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  animation: pulse 1.2s ease-in-out infinite;
}
@keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.6; } }

.chart-container {
  background: #131a29; border: 1px solid #1e2a3d; border-radius: 12px;
  padding: 20px; margin-bottom: 30px;
}
.chart-container h3 { margin-bottom: 16px; color: #94a3b8; font-size: 14px; text-transform: uppercase; letter-spacing: 1px; }

.bar-chart { display: flex; align-items: flex-end; gap: 3px; height: 140px; padding: 10px 0; }
.bar {
  flex: 1; min-width: 4px; border-radius: 3px 3px 0 0;
  transition: height 0.5s ease; position: relative; cursor: pointer;
}
.bar:hover { opacity: 0.8; }
.bar-tooltip {
  position: absolute; bottom: 100%; left: 50%; transform: translateX(-50%);
  background: #1e2a3d; color: white; padding: 4px 8px; border-radius: 4px;
  font-size: 11px; white-space: nowrap; display: none;
  z-index: 10;
}
.bar:hover .bar-tooltip { display: block; }

.rounds-table {
  background: #131a29; border: 1px solid #1e2a3d; border-radius: 12px; overflow: hidden;
}
.rounds-table h3 {
  padding: 16px 20px; color: #94a3b8; font-size: 14px; text-transform: uppercase;
  letter-spacing: 1px; border-bottom: 1px solid #1e2a3d;
}
table { width: 100%; border-collapse: collapse; }
th {
  text-align: left; padding: 12px 20px; color: #4a5a6d;
  font-size: 11px; text-transform: uppercase; letter-spacing: 1px;
  border-bottom: 1px solid #1e2a3d;
}
td { padding: 10px 20px; border-bottom: 1px solid #0d1520; font-size: 14px; }
tr:hover td { background: #0d1520; }
.crash-badge {
  display: inline-block; padding: 4px 12px; border-radius: 20px;
  font-weight: 700; font-size: 13px;
}
.crash-low { background: rgba(34,197,94,0.15); color: #22c55e; }
.crash-med { background: rgba(245,158,11,0.15); color: #f59e0b; }
.crash-high { background: rgba(239,68,68,0.15); color: #ef4444; }
.crash-epic { background: rgba(139,92,246,0.15); color: #8b5cf6; }

.empty-state { text-align: center; padding: 60px 20px; color: #4a5a6d; }
.empty-state .icon { font-size: 48px; margin-bottom: 16px; }
</style>
</head>
<body>
<div class="container">
  <h1>✈️ Aviator Probe</h1>
  <p class="subtitle">Real-time crash point interceptor &amp; dashboard</p>

  <!-- Status -->
  <div class="status-bar">
    <div class="status-card">
      <div class="label">Interceptor</div>
      <div class="value" id="status-running">Offline</div>
    </div>
    <div class="status-card">
      <div class="label">Game State</div>
      <div class="value" id="status-state">—</div>
    </div>
    <div class="status-card">
      <div class="label">Total Rounds</div>
      <div class="value" id="status-total">0</div>
    </div>
    <div class="status-card">
      <div class="label">Avg Crash</div>
      <div class="value" id="status-avg">—</div>
    </div>
    <div class="status-card">
      <div class="label">Max Crash</div>
      <div class="value" id="status-max">—</div>
    </div>
  </div>

  <!-- Controls -->
  <div class="controls">
    <button class="btn-start" id="btn-start">▶ Start Interceptor</button>
    <button class="btn-stop"  id="btn-stop" disabled>⏹ Stop</button>
    <button class="btn-test" id="btn-test">🎲 Test Crash</button>
  </div>

  <!-- Latest Crash -->
  <div class="latest-crash" id="latest-crash-card">
    <div class="crash-label" id="latest-label">Waiting for crash data...</div>
    <div class="crash-value" id="latest-value">—</div>
    <div class="crash-time" id="latest-time"></div>
  </div>

  <!-- Chart -->
  <div class="chart-container">
    <h3>📊 Recent Crash Points</h3>
    <div class="bar-chart" id="bar-chart"></div>
  </div>

  <!-- Rounds Table -->
  <div class="rounds-table">
    <h3>📋 Round History</h3>
    <div style="overflow-x:auto;">
      <table>
        <thead>
          <tr>
            <th>Round ID</th>
            <th>Crash Point</th>
            <th>Time</th>
          </tr>
        </thead>
        <tbody id="rounds-body"></tbody>
      </table>
    </div>
  </div>
</div>

<script>
const socket = io();

// DOM refs
const elRunning   = document.getElementById('status-running');
const elState     = document.getElementById('status-state');
const elTotal     = document.getElementById('status-total');
const elAvg       = document.getElementById('status-avg');
const elMax       = document.getElementById('status-max');
const elLatestVal = document.getElementById('latest-value');
const elLatestLbl = document.getElementById('latest-label');
const elLatestTime= document.getElementById('latest-time');
const elChart     = document.getElementById('bar-chart');
const elBody      = document.getElementById('rounds-body');
const btnStart    = document.getElementById('btn-start');
const btnStop     = document.getElementById('btn-stop');
const btnTest     = document.getElementById('btn-test');

// ---- Helpers ----
function crashClass(cp) {
  if (cp < 2) return 'crash-low';
  if (cp < 5) return 'crash-med';
  if (cp < 10) return 'crash-high';
  return 'crash-epic';
}

function barColor(cp) {
  if (cp < 2) return '#22c55e';
  if (cp < 5) return '#f59e0b';
  if (cp < 10) return '#ef4444';
  return '#8b5cf6';
}

function timeAgo(ts) {
  const sec = Math.floor((Date.now() - ts) / 1000);
  if (sec < 5) return 'just now';
  if (sec < 60) return sec + 's ago';
  const min = Math.floor(sec / 60);
  return min + 'm ago';
}

// ---- Render ----
function renderStats(stats) {
  if (!stats) return;
  elTotal.textContent = stats.totalRounds || 0;
  elAvg.textContent   = stats.avgCrash ? stats.avgCrash.toFixed(2) + 'x' : '—';
  elMax.textContent   = stats.maxCrash ? stats.maxCrash.toFixed(2) + 'x' : '—';
}

function renderRunning(running) {
  if (running) {
    elRunning.textContent = 'Running';
    elRunning.className = 'value connected';
    btnStart.disabled = true;
    btnStop.disabled = false;
  } else {
    elRunning.textContent = 'Offline';
    elRunning.className = 'value disconnected';
    btnStart.disabled = false;
    btnStop.disabled = true;
  }
}

function renderState(state) {
  if (!state) return;
  elState.textContent = state.charAt(0).toUpperCase() + state.slice(1);
  const cls = ['connected','disconnected','flying','waiting','crashed'].includes(state) ? state : '';
  elState.className = 'value' + (cls ? ' ' + cls : '');
}

function renderLatestCrash(crash) {
  if (!crash) return;
  elLatestVal.textContent = crash.crashPoint.toFixed(2) + 'x';
  elLatestVal.className = 'crash-value';
  elLatestLbl.textContent = '💥 Crashed at';
  elLatestTime.textContent = new Date(crash.timestamp).toLocaleTimeString() + ' (' + timeAgo(crash.timestamp) + ')';
}

function renderFlying() {
  elLatestVal.textContent = '✈️ FLYING';
  elLatestVal.className = 'flying-value';
  elLatestLbl.textContent = '🚀 Plane is up...';
  elLatestTime.textContent = '';
}

function renderWaiting() {
  elLatestVal.textContent = '⏳ Waiting';
  elLatestVal.className = 'crash-value';
  elLatestLbl.textContent = '⌛ Next round soon';
  elLatestTime.textContent = '';
}

function renderChart(roundsList) {
  if (!roundsList || roundsList.length === 0) {
    elChart.innerHTML = '<div class="empty-state"><div class="icon">📊</div>No data yet</div>';
    return;
  }
  const max = Math.max(...roundsList.map(r => r.crashPoint), 1);
  elChart.innerHTML = roundsList.map(r => {
    const h = (r.crashPoint / max) * 100;
    return `<div class="bar" style="height:${Math.max(h, 3)}%;background:${barColor(r.crashPoint)}">
      <div class="bar-tooltip">${r.crashPoint.toFixed(2)}x</div>
    </div>`;
  }).join('');
}

function renderTable(roundsList) {
  if (!roundsList || roundsList.length === 0) {
    elBody.innerHTML = '<tr><td colspan="3"><div class="empty-state"><div class="icon">📋</div>No rounds recorded yet. Start the interceptor or click "Test Crash".</div></td></tr>';
    return;
  }
  elBody.innerHTML = roundsList.map(r => {
    const cls = crashClass(r.crashPoint);
    return `<tr>
      <td style="font-family:monospace;font-size:12px;color:#6b7b8d;">${r.id}</td>
      <td><span class="crash-badge ${cls}">${r.crashPoint.toFixed(2)}x</span></td>
      <td style="color:#4a5a6d;">${new Date(r.timestamp).toLocaleTimeString()}</td>
    </tr>`;
  }).join('');
}

function refreshUI() {
  fetch('/api/recent')
    .then(r => r.json())
    .then(d => {
      renderStats(d.stats);
      renderState(d.state);
      renderChart(d.rounds);
      renderTable(d.rounds);
    })
    .catch(() => {});
}

// ---- Socket Events ----
socket.on('init', (data) => {
  if (data.stats) renderStats(data.stats);
  if (data.state) renderState(data.state);
  renderRunning(data.running);
  if (data.rounds) { renderChart(data.rounds); renderTable(data.rounds); }
});

socket.on('running', (running) => renderRunning(running));

socket.on('state', (s) => {
  renderState(s.state);
  if (s.state === 'flying') renderFlying();
  if (s.state === 'waiting') renderWaiting();
  if (s.state === 'crashed') { /* crash event handles this */ }
});

socket.on('crash', (crash) => {
  renderLatestCrash(crash);
  refreshUI();
});

socket.on('stats', (stats) => renderStats(stats));

// ---- Buttons ----
btnStart.addEventListener('click', () => { socket.emit('start'); });
btnStop.addEventListener('click',  () => { socket.emit('stop'); });
btnTest.addEventListener('click',  () => { socket.emit('test-crash', { crashPoint: parseFloat((Math.random() * 15 + 1).toFixed(2)) }); });

// ---- Auto-refresh ----
setInterval(refreshUI, 3000);
refreshUI();
</script>
</body>
</html>
